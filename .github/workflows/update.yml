name: 每日自动更新预测

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 调试文件结构
        run: |
          echo "=== 当前目录 ==="
          pwd
          echo "=== 根目录文件列表 ==="
          ls -la
          echo "=== 查找 ensemble_v5.py ==="
          find . -name "ensemble_v5.py"

      - name: 运行 V5.1 预测
        run: python ensemble_v5.py --output --auto-update

      - name: 提交更新后的 ensemble_data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ensemble_data_v5.js
          git diff --staged --quiet || git commit -m "自动更新预测数据 [skip ci]"
          git push
